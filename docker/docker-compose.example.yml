services:
  indomitus_rover_dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        ROS_DISTRO: humble
    image: indomitus-rover:humble
    container_name: indomitus_rover_dev
    network_mode: host
    stdin_open: true      # -i
    tty: true             # -t
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
    volumes:
      - ./:/work:rw
      - ./src:/opt/ws/src:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
